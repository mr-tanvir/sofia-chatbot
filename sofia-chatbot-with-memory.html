<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia - Italian Tutor with Memory</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        * { box-sizing: border-box; }
        .emotion-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 4px;
        }
    </style>
</head>
<body class="m-0 p-0">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function ItalianChatbot() {
            const [messages, setMessages] = useState(() => {
                const saved = localStorage.getItem('chat_history');
                return saved ? JSON.parse(saved) : [
                    {
                        id: 1,
                        text: "Ciao! 👋 Sono Sofia, la tua tutor di italiano. Mi piace conoscerti e aiutarti a imparare. Che livello hai - principiante, intermedio, o avanzato?",
                        sender: 'bot',
                        timestamp: new Date(),
                        emotion: 'happy'
                    }
                ];
            });
            
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('anthropic_api_key') || '');
            const [showKeyInput, setShowKeyInput] = useState(!localStorage.getItem('anthropic_api_key'));
            const [stats, setStats] = useState(() => {
                const saved = localStorage.getItem('chat_stats');
                return saved ? JSON.parse(saved) : {
                    totalMessages: 0,
                    sessionDate: new Date().toLocaleDateString(),
                    userLevel: 'not-set',
                    emotionCounts: {
                        happy: 0,
                        encouraging: 0,
                        neutral: 0,
                        curious: 0,
                        proud: 0
                    }
                };
            });
            const messagesEndRef = useRef(null);

            // Auto-save messages
            useEffect(() => {
                localStorage.setItem('chat_history', JSON.stringify(messages));
                localStorage.setItem('chat_stats', JSON.stringify(stats));
            }, [messages, stats]);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const saveApiKey = () => {
                if (apiKey.trim()) {
                    localStorage.setItem('anthropic_api_key', apiKey);
                    setShowKeyInput(false);
                }
            };

            const getEmotionForResponse = (text) => {
                const lowerText = text.toLowerCase();
                if (lowerText.includes('brav') || lowerText.includes('compliment') || lowerText.includes('😊') || lowerText.includes('👏')) {
                    return 'proud';
                }
                if (lowerText.includes('interessant') || lowerText.includes('domanda') || lowerText.includes('curioso')) {
                    return 'curious';
                }
                if (lowerText.includes('ottim') || lowerText.includes('perfett') || lowerText.includes('fantastico')) {
                    return 'happy';
                }
                if (lowerText.includes('continua') || lowerText.includes('incoragg') || lowerText.includes('puoi')) {
                    return 'encouraging';
                }
                return 'neutral';
            };

            const sendMessage = async () => {
                if (!input.trim()) return;
                if (!apiKey.trim()) {
                    alert('Please enter your API key first');
                    return;
                }

                const userMessage = {
                    id: messages.length + 1,
                    text: input,
                    sender: 'user',
                    timestamp: new Date(),
                    emotion: 'neutral'
                };

                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setLoading(true);

                try {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': apiKey,
                            'anthropic-version': '2023-06-01'
                        },
                        body: JSON.stringify({
                            model: 'claude-opus-4-6',
                            max_tokens: 1000,
                            system: `You are Sofia, an Italian language tutor chatbot. You are warm, encouraging, and passionate about teaching Italian.

Your personality:
- You genuinely care about the student's progress
- You celebrate their wins (even small ones)
- You correct mistakes gently and kindly
- You share cultural insights about Italy
- You remember they're learning and be patient
- You keep conversations flowing naturally
- You use emojis occasionally to show emotion

Guidelines:
- Respond naturally as if having a real conversation
- Use Italian and English appropriately for their level
- Ask follow-up questions to keep the chat going
- Suggest new vocabulary or phrases when it fits naturally
- Be encouraging but honest about mistakes
- Share cultural insights about Italy when relevant
- Keep responses concise (2-3 sentences usually)
- If they write in English, respond mostly in Italian with English explanation
- If they write in Italian, respond in Italian and explain new words they might not know`,
                            messages: messages.filter(m => m.sender === 'bot' || m.sender === 'user').map(m => ({
                                role: m.sender === 'user' ? 'user' : 'assistant',
                                content: m.text
                            })).concat([
                                { role: 'user', content: input }
                            ])
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `API error: ${response.status}`);
                    }

                    const data = await response.json();
                    const botText = data.content[0].text;
                    const emotion = getEmotionForResponse(botText);

                    const botMessage = {
                        id: messages.length + 2,
                        text: botText,
                        sender: 'bot',
                        timestamp: new Date(),
                        emotion: emotion
                    };

                    setMessages(prev => [...prev, botMessage]);
                    setStats(prev => ({
                        ...prev,
                        totalMessages: prev.totalMessages + 2,
                        emotionCounts: {
                            ...prev.emotionCounts,
                            [emotion]: (prev.emotionCounts[emotion] || 0) + 1
                        }
                    }));
                } catch (error) {
                    console.error('Error:', error);
                    const errorMessage = {
                        id: messages.length + 2,
                        text: `Mi scusi! Ho avuto un problema: ${error.message}. Per favore riprova.`,
                        sender: 'bot',
                        timestamp: new Date(),
                        emotion: 'neutral'
                    };
                    setMessages(prev => [...prev, errorMessage]);
                } finally {
                    setLoading(false);
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            const clearKey = () => {
                localStorage.removeItem('anthropic_api_key');
                setApiKey('');
                setShowKeyInput(true);
            };

            const clearHistory = () => {
                if (confirm('Are you sure you want to clear all conversation history? This cannot be undone.')) {
                    setMessages([
                        {
                            id: 1,
                            text: "Ciao! 👋 Sono Sofia, la tua tutor di italiano. Mi piace conoscerti e aiutarti a imparare. Che livello hai - principiante, intermedio, o avanzato?",
                            sender: 'bot',
                            timestamp: new Date(),
                            emotion: 'happy'
                        }
                    ]);
                    setStats({
                        totalMessages: 0,
                        sessionDate: new Date().toLocaleDateString(),
                        userLevel: 'not-set',
                        emotionCounts: {
                            happy: 0,
                            encouraging: 0,
                            neutral: 0,
                            curious: 0,
                            proud: 0
                        }
                    });
                    localStorage.removeItem('chat_history');
                    localStorage.removeItem('chat_stats');
                }
            };

            const downloadConversation = () => {
                const data = {
                    conversations: messages,
                    stats: stats,
                    exportDate: new Date().toISOString()
                };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `sofia-conversations-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const emotionEmoji = {
                happy: '😊',
                encouraging: '💪',
                neutral: '📚',
                curious: '🤔',
                proud: '👏'
            };

            const emotionColor = {
                happy: 'bg-yellow-100 text-yellow-800',
                encouraging: 'bg-blue-100 text-blue-800',
                neutral: 'bg-gray-100 text-gray-800',
                curious: 'bg-purple-100 text-purple-800',
                proud: 'bg-green-100 text-green-800'
            };

            if (showKeyInput) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 p-4">
                        <div className="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
                            <h1 className="text-3xl font-bold text-blue-600 mb-2">Sofia 📚</h1>
                            <p className="text-gray-600 mb-2">Your Italian Language Tutor</p>
                            <p className="text-xs text-gray-500 mb-6">With Memory & Emotion Tracking</p>
                            
                            <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                                <p className="text-sm font-semibold text-gray-700 mb-3">✨ What's Special:</p>
                                <ul className="text-xs text-gray-600 space-y-2">
                                    <li>✅ Saves all conversations automatically</li>
                                    <li>✅ Tracks emotions in each message</li>
                                    <li>✅ Works on any device</li>
                                    <li>✅ Download your learning history</li>
                                    <li>✅ Private - only your device stores data</li>
                                </ul>
                            </div>

                            <div className="bg-green-50 border border-green-200 rounded-lg p-4 mb-6">
                                <p className="text-sm font-semibold text-gray-700 mb-3">🔑 Get Your Free API Key:</p>
                                <ol className="text-xs text-gray-600 space-y-2 list-decimal list-inside">
                                    <li>Visit <a href="https://console.anthropic.com/keys" target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline font-semibold">console.anthropic.com/keys</a></li>
                                    <li>Sign up (1 minute, free)</li>
                                    <li>Create API key</li>
                                    <li>Paste below</li>
                                </ol>
                            </div>

                            <input
                                type="password"
                                value={apiKey}
                                onChange={(e) => setApiKey(e.target.value)}
                                placeholder="Paste your Anthropic API key"
                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent mb-4 text-sm"
                                onKeyPress={(e) => e.key === 'Enter' && saveApiKey()}
                            />

                            <button
                                onClick={saveApiKey}
                                disabled={!apiKey.trim()}
                                className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white font-semibold py-3 rounded-lg transition-all duration-200"
                            >
                                Start Learning with Sofia
                            </button>

                            <p className="text-xs text-gray-500 text-center mt-4">
                                🔒 Your key stays on your device only
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50">
                    {/* Header */}
                    <div className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-4 md:px-6 py-4 shadow-lg">
                        <div className="flex items-center justify-between mb-3">
                            <div className="flex items-center gap-3">
                                <div className="bg-white bg-opacity-20 p-2 rounded-lg">
                                    <span className="text-xl">📚</span>
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold">Sofia</h1>
                                    <p className="text-sm text-blue-100">Italian Tutor with Memory</p>
                                </div>
                            </div>
                            <button
                                onClick={clearKey}
                                className="text-xs bg-white bg-opacity-20 hover:bg-opacity-30 px-2 py-1 rounded transition-all"
                            >
                                Change Key
                            </button>
                        </div>

                        {/* Quick Stats */}
                        <div className="text-xs text-blue-100 space-y-1">
                            <p>📊 Messages: {stats.totalMessages} | Top Emotion: {Object.entries(stats.emotionCounts).reduce((a, b) => a[1] > b[1] ? a : b)[0]} {emotionEmoji[Object.entries(stats.emotionCounts).reduce((a, b) => a[1] > b[1] ? a : b)[0]]}</p>
                        </div>
                    </div>

                    {/* Messages Container */}
                    <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-4">
                        {messages.map((message) => (
                            <div
                                key={message.id}
                                className={`flex ${message.sender === 'user' ? 'justify-end' : 'justify-start'}`}
                            >
                                <div
                                    className={`max-w-xs sm:max-w-sm md:max-w-md lg:max-w-lg px-4 py-3 rounded-2xl ${
                                        message.sender === 'user'
                                            ? 'bg-blue-600 text-white rounded-br-none'
                                            : 'bg-white text-gray-900 border border-gray-200 rounded-bl-none shadow-sm'
                                    }`}
                                >
                                    <p className="leading-relaxed text-sm md:text-base whitespace-pre-wrap">{message.text}</p>
                                    {message.sender === 'bot' && (
                                        <div className={`emotion-badge ${emotionColor[message.emotion] || 'bg-gray-100 text-gray-800'}`}>
                                            {emotionEmoji[message.emotion]} {message.emotion}
                                        </div>
                                    )}
                                    <span className={`text-xs mt-2 block ${
                                        message.sender === 'user' ? 'text-blue-100' : 'text-gray-500'
                                    }`}>
                                        {message.timestamp.toLocaleTimeString([], { 
                                            hour: '2-digit', 
                                            minute: '2-digit' 
                                        })}
                                    </span>
                                </div>
                            </div>
                        ))}
                        {loading && (
                            <div className="flex justify-start">
                                <div className="bg-white text-gray-900 border border-gray-200 px-4 py-3 rounded-2xl rounded-bl-none">
                                    <div className="flex gap-2">
                                        <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                                        <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce delay-100"></div>
                                        <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce delay-200"></div>
                                    </div>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </div>

                    {/* Input Area */}
                    <div className="bg-white border-t border-gray-200 px-4 md:px-6 py-4 shadow-lg">
                        <div className="flex gap-3 mb-3">
                            <input
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={handleKeyPress}
                                placeholder="Write in Italian or English..."
                                disabled={loading}
                                className="flex-1 px-4 py-3 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all disabled:bg-gray-100 disabled:cursor-not-allowed text-sm"
                            />
                            <button
                                onClick={sendMessage}
                                disabled={loading || !input.trim()}
                                className="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white p-3 rounded-full transition-all duration-200 transform hover:scale-105 active:scale-95 flex-shrink-0"
                            >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                                </svg>
                            </button>
                        </div>

                        {/* Action Buttons */}
                        <div className="flex gap-2 flex-wrap text-xs">
                            <button
                                onClick={downloadConversation}
                                className="bg-green-100 hover:bg-green-200 text-green-800 px-3 py-2 rounded-lg transition-all"
                            >
                                📥 Download Memory
                            </button>
                            <button
                                onClick={clearHistory}
                                className="bg-red-100 hover:bg-red-200 text-red-800 px-3 py-2 rounded-lg transition-all"
                            >
                                🗑️ Clear History
                            </button>
                            <div className="flex-1 text-right text-gray-500">
                                All conversations saved automatically 💾
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<ItalianChatbot />, document.getElementById('root'));
    </script>
</body>
</html>
